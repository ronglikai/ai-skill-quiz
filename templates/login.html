{% extends "base.html" %}
{% block title %}登录 - AI Skill 知识测试系统{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
            <!-- Logo区域 -->
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-primary-50 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">AI Skill 知识测试系统</h1>
                <p class="text-gray-500 mt-2">测试你对AI技能搭建的掌握程度</p>
            </div>

            <!-- 登录表单 -->
            <form action="/login" method="post">
                <div class="mb-6">
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-2">你的姓名</label>
                    <input
                        type="text"
                        id="name"
                        name="name"
                        required
                        autofocus
                        placeholder="请输入你的姓名"
                        class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition text-base"
                    >
                </div>
                <button
                    type="submit"
                    class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-3 px-4 rounded-xl transition duration-200 text-base"
                >
                    进入系统
                </button>
            </form>

            <!-- 说明 -->
            <div class="mt-6 p-4 bg-primary-50 rounded-xl">
                <h3 class="text-sm font-semibold text-primary-dark mb-2">系统说明</h3>
                <ul class="text-xs text-gray-600 space-y-1">
                    <li>&#8226; 基于AI工具知识包内容出题，涵盖Skill搭建核心知识</li>
                    <li>&#8226; 问答形式测试，AI智能评估你的理解程度</li>
                    <li>&#8226; 答错时系统会给出针对性引导，帮助修正理解</li>
                    <li>&#8226; 所有测试记录可随时查看和复习</li>
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}
